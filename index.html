<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>yhmist</title>
  <meta name="description" content="yhmist · personal tools" />
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#e52521" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="yhmist" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=9" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png?v=9" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png?v=9" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png?v=9" />
  <link rel="manifest" href="/site.webmanifest?v=9" />
  <link rel="stylesheet" href="css/style.css?v=15" />
</head>
<body>
  <div class="world" aria-hidden="true">
    <div class="sky">
      <span class="cloud cloud-a"></span>
      <span class="cloud cloud-b"></span>
    </div>
    <div class="stage">
      <span class="bush"></span>
      <span class="pipe">
        <span class="pipe-lip"></span>
        <span class="pipe-body"></span>
      </span>
      <div class="grass"></div>
      <div class="dirt"></div>
    </div>
  </div>

  <main class="shell">
    <header class="intro">
      <h1 class="brand">
        <span class="px-text px-text--xl px-text--brand" data-px="yhmist"></span>
      </h1>
    </header>

    <nav class="tools" aria-label="工具">
      <a class="tool" href="https://yhmist.github.io/invest/" aria-label="INVEST">
        <span class="tool-name px-text px-text--lg" data-px="INVEST"></span>
      </a>
      <a class="tool" href="https://yhmist.github.io/english/" aria-label="ENGLISH">
        <span class="tool-name px-text px-text--lg" data-px="ENGLISH"></span>
      </a>
    </nav>
  </main>

  <script src="js/glyphs.js?v=8"></script>
  <script src="js/pixel-text.js?v=8"></script>
</body>
</html>
