<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>yhmist</title>
  <meta name="description" content="yhmist · personal tools" />
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#5c94fc" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="yhmist" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/style.css?v=4" />
</head>
<body>
  <div class="sky" aria-hidden="true">
    <span class="cloud cloud-a"></span>
    <span class="cloud cloud-b"></span>
    <span class="cloud cloud-c"></span>
    <span class="hill hill-a"></span>
    <span class="hill hill-b"></span>
    <span class="ground"></span>
  </div>

  <main class="shell">
    <header class="intro">
      <p class="badge">1-1</p>
      <h1 class="brand">yhmist</h1>
    </header>

    <nav class="tools" aria-label="工具">
      <a class="tool" href="https://yhmist.github.io/invest/">
        <span class="tool-name">invest</span>
        <span class="tool-desc">Russell 1000 月度动量选股 · 信号与回测跟踪</span>
        <span class="tool-go" aria-hidden="true">GO</span>
      </a>
      <a class="tool" href="https://yhmist.github.io/english/">
        <span class="tool-name">english</span>
        <span class="tool-desc">英语对话跟读 · 点句跳转、点词查释义</span>
        <span class="tool-go" aria-hidden="true">GO</span>
      </a>
    </nav>
  </main>
</body>
</html>
