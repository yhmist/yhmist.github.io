<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>yhmist</title>
  <meta name="description" content="yhmist · personal tools" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700&family=Figtree:wght@400;500;600&family=Noto+Sans+SC:wght@400;500&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="mist" aria-hidden="true"></div>

  <main class="shell">
    <header class="intro">
      <h1 class="brand">yhmist</h1>
    </header>

    <nav class="tools" aria-label="工具">
      <a class="tool" href="https://yhmist.github.io/invest/">
        <span class="tool-name">invest</span>
        <span class="tool-desc">Russell 1000 月度动量选股 · 信号与回测跟踪</span>
        <span class="tool-go" aria-hidden="true">打开</span>
      </a>
      <a class="tool" href="https://yhmist.github.io/english/">
        <span class="tool-name">english</span>
        <span class="tool-desc">英语对话跟读 · 点句跳转、点词查释义</span>
        <span class="tool-go" aria-hidden="true">打开</span>
      </a>
    </nav>
  </main>
</body>
</html>
