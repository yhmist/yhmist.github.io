<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>yhmist</title>
  <meta name="description" content="yhmist · personal tools" />
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#5c94fc" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="yhmist" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=5" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png?v=5" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png?v=5" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png?v=5" />
  <link rel="manifest" href="/site.webmanifest?v=5" />
  <link rel="stylesheet" href="css/style.css?v=8" />
</head>
<body>
  <div class="sky" aria-hidden="true">
    <span class="cloud cloud-a"></span>
    <span class="cloud cloud-b"></span>
    <span class="cloud cloud-c"></span>
    <span class="hill hill-a"></span>
    <span class="hill hill-b"></span>
    <span class="ground"></span>
  </div>

  <main class="shell">
    <header class="intro">
      <p class="badge">
        <span class="px-text px-text--sm" data-px="1-1"></span>
      </p>
      <h1 class="brand">
        <span class="px-text px-text--xl px-text--brand" data-px="yhmist"></span>
      </h1>
    </header>

    <nav class="tools" aria-label="工具">
      <a class="tool" href="https://yhmist.github.io/invest/">
        <span class="tool-name px-text px-text--md" data-px="INVEST"></span>
        <span
          class="tool-desc px-text px-text--sm px-text--muted"
          data-px="Russell 1000 月度动量选股 · 信号与回测跟踪"
        ></span>
        <span class="tool-go" aria-hidden="true">
          <span class="px-text px-text--sm" data-px="GO"></span>
        </span>
      </a>
      <a class="tool" href="https://yhmist.github.io/english/">
        <span class="tool-name px-text px-text--md" data-px="ENGLISH"></span>
        <span
          class="tool-desc px-text px-text--sm px-text--muted"
          data-px="英语对话跟读 · 点句跳转、点词查释义"
        ></span>
        <span class="tool-go" aria-hidden="true">
          <span class="px-text px-text--sm" data-px="GO"></span>
        </span>
      </a>
    </nav>
  </main>

  <script src="js/glyphs.js?v=8"></script>
  <script src="js/pixel-text.js?v=8"></script>
</body>
</html>
